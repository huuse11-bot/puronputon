<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ぷろんぷとん - AI相談文メーカー</title>
  <style>
    :root {
      --grass: #78c850;
      --grass-dark: #3f8f3b;
      --grass-light: #b7e986;
      --panel: #ffffff;
      --text: #243022;
      --muted: #61705c;
      --line: rgba(36,48,34,.14);
      --pig: #fff7f8;
      --pink: #ffc9d4;
      --brown: #7a4a2a;
      --shadow: 0 14px 30px rgba(31, 82, 29, .18);
      --radius: 24px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 8%, rgba(255,255,255,.55), transparent 18%),
        radial-gradient(circle at 88% 12%, rgba(255,255,255,.35), transparent 16%),
        linear-gradient(180deg, var(--grass-light), var(--grass));
      line-height: 1.65;
      padding-bottom: calc(92px + env(safe-area-inset-bottom));
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .22;
      background-image:
        linear-gradient(60deg, transparent 0 94%, rgba(255,255,255,.55) 95% 100%),
        linear-gradient(120deg, transparent 0 94%, rgba(255,255,255,.45) 95% 100%);
      background-size: 28px 28px;
    }
    button, textarea { font: inherit; }
    .app {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 16px 14px 32px;
      position: relative;
    }
    .card {
      background: rgba(255,255,255,.94);
      border: 1px solid rgba(255,255,255,.65);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      margin: 12px 0;
      backdrop-filter: blur(8px);
    }
    .hero {
      text-align: center;
      padding: 24px 18px 22px;
    }
    .pig {
      width: 112px;
      height: 92px;
      margin: 0 auto 12px;
      position: relative;
    }
    .pig-face {
      width: 96px;
      height: 76px;
      background: var(--pig);
      border: 3px solid #f2d8dd;
      border-radius: 48% 48% 44% 44%;
      position: absolute;
      left: 8px;
      top: 12px;
      box-shadow: inset 0 -7px 0 rgba(255,201,212,.25);
    }
    .pig-ear {
      width: 28px;
      height: 28px;
      background: var(--pig);
      border: 3px solid #f2d8dd;
      position: absolute;
      top: 2px;
      border-radius: 8px 18px 8px 18px;
    }
    .pig-ear.left { left: 16px; transform: rotate(-24deg); }
    .pig-ear.right { right: 16px; transform: rotate(114deg); }
    .eye {
      width: 8px; height: 8px; background: #2a2a2a; border-radius: 50%;
      position: absolute; top: 36px;
    }
    .eye.left { left: 34px; }
    .eye.right { right: 34px; }
    .nose {
      width: 34px; height: 24px; background: var(--pink); border: 2px solid #f1a6b6;
      border-radius: 999px; position: absolute; left: 31px; top: 44px;
    }
    .nose::before, .nose::after {
      content: ""; position: absolute; top: 8px; width: 5px; height: 8px;
      background: #b96b78; border-radius: 50%;
    }
    .nose::before { left: 9px; }
    .nose::after { right: 9px; }
    h1 {
      margin: 0;
      font-size: clamp(34px, 10vw, 54px);
      line-height: 1.05;
      letter-spacing: .04em;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 4px 0 rgba(63,143,59,.65), 0 10px 18px rgba(31,82,29,.22);
    }
    .subtitle {
      margin: 10px 0 0;
      color: #244f23;
      font-weight: 800;
      font-size: 16px;
    }
    .lead {
      margin: 12px 0 0;
      color: #3f5d39;
      font-size: 14px;
    }
    .screen { display: none; }
    .screen.active { display: block; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: calc(8px + env(safe-area-inset-top)) 0 8px;
      background: linear-gradient(180deg, rgba(183,233,134,.96), rgba(183,233,134,.72), transparent);
      backdrop-filter: blur(8px);
    }
    .progress-card {
      background: rgba(255,255,255,.88);
      border: 1px solid rgba(255,255,255,.7);
      border-radius: 18px;
      padding: 10px 12px;
      box-shadow: 0 8px 18px rgba(31,82,29,.12);
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .progress {
      height: 10px;
      border-radius: 999px;
      background: rgba(63,143,59,.18);
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, #fff, #ffdee6);
      transition: width .22s ease;
    }
    .question-title {
      font-size: clamp(23px, 6vw, 32px);
      line-height: 1.35;
      margin: 0 0 8px;
      font-weight: 900;
    }
    .question-sub {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 14px;
    }
    .choices {
      display: grid;
      gap: 10px;
    }
    .choice {
      width: 100%;
      min-height: 60px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 18px;
      padding: 14px 16px;
      text-align: left;
      font-weight: 800;
      box-shadow: 0 6px 14px rgba(31,82,29,.08);
      cursor: pointer;
    }
    .choice:active { transform: scale(.986); }
    .choice small {
      display: block;
      color: var(--muted);
      font-weight: 600;
      margin-top: 2px;
    }
    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }
    .btn {
      border: none;
      border-radius: 18px;
      min-height: 52px;
      padding: 13px 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .btn-main {
      background: #fff;
      color: var(--grass-dark);
      box-shadow: var(--shadow);
      border: 2px solid rgba(255,255,255,.8);
    }
    .btn-dark {
      background: #243022;
      color: #fff;
    }
    .btn-soft {
      background: rgba(255,255,255,.82);
      color: var(--text);
      border: 1px solid var(--line);
    }
    .btn-pink {
      background: #ffdbe3;
      color: #622b35;
    }
    .summary {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
    }
    .chip {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 14px;
      background: rgba(120,200,80,.10);
      border: 1px solid rgba(63,143,59,.18);
      font-size: 13px;
    }
    .chip b { color: #244f23; }
    textarea {
      width: 100%;
      min-height: 118px;
      resize: vertical;
      border-radius: 18px;
      border: 1px solid var(--line);
      padding: 14px;
      outline: none;
      background: #fff;
    }
    details {
      background: rgba(255,255,255,.78);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 0;
      overflow: hidden;
    }
    summary {
      cursor: pointer;
      padding: 14px 16px;
      font-weight: 900;
      list-style: none;
    }
    summary::-webkit-details-marker { display: none; }
    .details-inner { padding: 0 14px 14px; }
    .prompt-box {
      background: #122018;
      color: #f8fff2;
      border-radius: 20px;
      padding: 16px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
      line-height: 1.75;
      max-height: 48vh;
      overflow: auto;
      border: 1px solid rgba(255,255,255,.12);
    }
    .result-title {
      font-size: clamp(26px, 7vw, 38px);
      margin: 0 0 8px;
      font-weight: 900;
    }
    .ai-links {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }
    .ai-links a {
      display: block;
      text-align: center;
      text-decoration: none;
      border-radius: 18px;
      padding: 14px 16px;
      min-height: 52px;
      font-weight: 900;
    }
    .chatgpt { background: #10a37f; color: #fff; }
    .gemini { background: #e9efff; color: #24428e; }
    .claude { background: #f4e7d3; color: #6a3c18; }
    .copy-ok {
      position: fixed;
      left: 50%;
      bottom: calc(18px + env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(120px);
      background: #243022;
      color: #fff;
      padding: 12px 16px;
      border-radius: 999px;
      font-weight: 900;
      transition: transform .2s ease;
      z-index: 20;
      white-space: nowrap;
    }
    .copy-ok.show { transform: translateX(-50%) translateY(0); }
    .footer-note {
      color: #31572c;
      font-size: 12px;
      text-align: center;
      margin: 16px 0 0;
    }
  </style>
</head>

  <div class="app">
    <section id="home" class="screen active">
      <div class="hero">
        <div class="pig" aria-hidden="true">
          <div class="pig-ear left"></div><div class="pig-ear right"></div>
          <div class="pig-face">

          </div>
        </div>
        <h1>ぷろんぷとん</h1>
        <p class="subtitle">選ぶだけで、AIに貼れる相談文を作る。</p>
        <p class="lead">悩みをうまく説明できなくても大丈夫。いくつか選ぶだけで、ChatGPTなどに渡しやすい相談文を作ります。</p>
      </div>
      <div class="card">
        <button class="btn btn-main" onclick="start()">相談文を作る</button>
        <p class="footer-note">補足入力は任意。まずは選ぶだけでOK。</p>
      </div>
    </section>

    <section id="wizard" class="screen">

          <div class="progress"><div id="progressFill" class="progress-fill"></div></div>
        </div>
      </div>
      <div class="card">
        <h2 id="questionTitle" class="question-title">質問</h2>
        <p id="questionSub" class="question-sub"></p>
        <div id="choices" class="choices"></div>
        <div id="noteArea" style="display:none;">
          <details>
            <summary>＋補足を書く（任意）</summary>
            <div class="details-inner">
              <textarea id="noteText" placeholder="具体的な状況があれば自由にどうぞ"></textarea>
            </div>
          </details>
          <button class="btn btn-dark" style="width:100%; margin-top:12px;" onclick="nextFromNote()">次へ</button>
        </div>
        <div class="btn-row">
          <button class="btn btn-soft" onclick="back()">戻る</button>
          <button class="btn btn-pink" onclick="resetAll()">最初から</button>
        </div>
      </div>
    </section>

    <section id="result" class="screen">
      <div class="card">
        <h2 class="result-title">相談文完成</h2>
        <p class="question-sub">コピーしてAIに貼るか、そのままAIを開いて使ってください。</p>
        <div class="summary" id="summary"></div>
        <div class="prompt-box" id="promptBox"></div>
        <button class="btn btn-dark" style="width:100%; margin-top:12px;" onclick="copyPrompt()">📋 コピーする</button>
        <div class="ai-links">
          <a class="chatgpt" href="https://chat.openai.com/" target="_blank" rel="noopener">🤖 ChatGPTで開く（おすすめ）</a>
          <a class="gemini" href="https://gemini.google.com/" target="_blank" rel="noopener">💎 Geminiで開く</a>
          <a class="claude" href="https://claude.ai/" target="_blank" rel="noopener">🧠 Claudeで開く</a>
        </div>
        <button class="btn btn-soft" style="width:100%; margin-top:12px;" onclick="resetAll()">もう一度作る</button>
      </div>
    </section>
  </div>
  <div id="copyOk" class="copy-ok">コピーしました</div>

作業": "仕事構造・責任範囲・権限・優先順位・再現性を重視して分析する", "人間関係": "双方の認識差・期待値・情報差を中心に分析する", "恋愛": "相手心理を断定せず複数の可能性として整理する", "自己理解": "価値観・強み・弱み・行動パターンを構造化する", "感情整理": "感情の原因と背景を分離して整理する", "お金": "精神論ではなく収入・支出・資産・リスクで分析する", "健康": "生活習慣・環境・行動要因を優先して分析する", "将来・人生": "目標・制約・選択肢・リスクを整理する", "Template": "以下はユーザーが選択形式で整理した相談情報です。表面的な一般論ではなく、選択結果から前提・原因・優先順位・次の行動を分析してください。"}, "fallbackCommon": {"period": ["今日", "数日", "数週間", "数ヶ月", "数年以上"], "emotion": ["怒り", "不安", "悲しみ", "焦り", "モヤモヤ", "無感情", "その他"], "goal": ["解決策が欲しい", "原因分析してほしい", "相手心理を知りたい", "自分を理解したい", "行動計画が欲しい", "第三者視点が欲しい", "気持ちを整理したい"]}};

const state = {
  path: [],
  answers: {},
  currentStep: 1,
  currentParentId: "",
  genre: ""
};

const fixedSteps = [
  { step: 1, key: "genre", title: "何について相談したい？", sub: "近いものを選んでください。" },
  { step: 2, key: "category", title: "どんな内容に近い？", sub: "大まかな悩みの種類を選びます。" },
  { step: 3, key: "target", title: "関係しているものは？", sub: "人・対象・テーマを選びます。" },
  { step: 4, key: "situation", title: "何が一番近い？", sub: "今起きていることに近いものを選びます。" },
  { step: 5, key: "period", title: "どれくらい続いてる？", sub: "ざっくりでOKです。" },
  { step: 6, key: "emotion", title: "今の感情に近いものは？", sub: "複数ある場合は一番強いものを選びます。" },
  { step: 7, key: "goal", title: "AIに何をしてほしい？", sub: "欲しい回答の方向を選びます。" },
  { step: 8, key: "note", title: "補足はある？", sub: "書かなくても進めます。" },
  { step: 9, key: "style", title: "どんな回答がほしい？", sub: "迷ったら「おまかせ」でOKです。" },
];

function $(id) { return document.getElementById(id); }

function start() {
  state.path = [];
  state.answers = {};
  state.currentStep = 1;
  state.currentParentId = "";
  state.genre = "";
  show("wizard");
  renderStep();
}

function show(name) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  $(name).classList.add("active");
  window.scrollTo({top:0, behavior:"smooth"});
}

function normalizeStep(s) {
  const n = parseInt(String(s).replace(/[^0-9]/g, ""), 10);
  return Number.isFinite(n) ? n : null;
}

function getNodesForStep(step) {
  if (step === 1) {
    const genres = [...new Set(DB.nodes.map(n => n.genre).filter(Boolean))];
    return genres.map((g, i) => ({ node_id: "genre_" + i, option_label: g, genre: g, step: "1" }));
  }
  if (step >= 2 && step <= 4) {
    let candidates = DB.nodes.filter(n => n.genre === state.genre && normalizeStep(n.step) === step);
    if (state.currentParentId) {
      const byParent = candidates.filter(n => n.parent_id === state.currentParentId);
      if (byParent.length) candidates = byParent;
      else {
        const byLabel = candidates.filter(n => n.parent_label === state.path[state.path.length - 1]?.label);
        if (byLabel.length) candidates = byLabel;
      }
    }
    const seen = new Set();
    return candidates.filter(n => {
      const key = n.option_label;
      if (!key || seen.has(key)) return false;
      seen.add(key);
      return true;
    });
  }
  if (step === 5) return DB.fallbackCommon.period.map(label => ({option_label: label}));
  if (step === 6) return DB.fallbackCommon.emotion.map(label => ({option_label: label}));
  if (step === 7) return DB.fallbackCommon.goal.map(label => ({option_label: label}));
  if (step === 9) return DB.styles.map(s => ({option_label: s.label, instruction: s.instruction}));
  return [];
}

function renderStep() {
  const def = fixedSteps[state.currentStep - 1];
  $("stepLabel").textContent = `STEP ${state.currentStep} / 9`;
  $("stepHint").textContent = def.title;
  $("progressFill").style.width = `${Math.round((state.currentStep-1)/8*100)}%`;
  $("questionTitle").textContent = def.title;
  $("questionSub").textContent = def.sub;
  $("choices").innerHTML = "";
  $("noteArea").style.display = "none";

  if (state.currentStep === 8) {
    $("noteArea").style.display = "block";
    return;
  }

  const nodes = getNodesForStep(state.currentStep);
  if (!nodes.length && state.currentStep <= 4) {
    // If no deeper branch exists, jump to period.
    state.currentStep = 5;
    renderStep();
    return;
  }

  nodes.forEach(n => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.type = "button";
    btn.innerHTML = escapeHtml(n.option_label);
    btn.onclick = () => selectOption(n);
    $("choices").appendChild(btn);
  });
}

function selectOption(n) {
  const def = fixedSteps[state.currentStep - 1];
  state.answers[def.key] = n.option_label;
  if (state.currentStep === 1) {
    state.genre = n.option_label;
    state.currentParentId = "";
  } else if (state.currentStep <= 4) {
    state.currentParentId = n.node_id || "";
  }
  state.path.push({step: state.currentStep, key: def.key, label: n.option_label, node_id: n.node_id || ""});
  if (state.currentStep === 9) {
    state.answers.styleInstruction = n.instruction || "";
    renderResult();
    return;
  }
  state.currentStep += 1;
  renderStep();
}

function nextFromNote() {
  state.answers.note = $("noteText").value.trim();
  state.path.push({step: 8, key: "note", label: state.answers.note ? "補足あり" : "補足なし"});
  state.currentStep = 9;
  renderStep();
}

function back() {
  if (state.currentStep === 1) {
    show("home");
    return;
  }
  const last = state.path.pop();
  if (last) delete state.answers[last.key];
  state.currentStep -= 1;
  if (state.currentStep < 1) state.currentStep = 1;
  // Rebuild parent from latest step <=4
  const latestParent = [...state.path].reverse().find(p => p.step >= 2 && p.step <= 4 && p.node_id);
  state.currentParentId = latestParent ? latestParent.node_id : "";
  const g = state.path.find(p => p.key === "genre");
  state.genre = g ? g.label : "";
  renderStep();
}

function resetAll() {
  $("noteText").value = "";
  start();
}

function genreCorrection() {
  return DB.genreCorrections[state.answers.genre] || "";
}

function styleInstruction() {
  return state.answers.styleInstruction || (DB.styles.find(s => s.label === state.answers.style)?.instruction || "");
}

function makePrompt() {
  const a = state.answers;
  return [
`以下の相談内容を、利用者が次に行動しやすい形で分析してください。`,
``,
`【相談ジャンル】`,
a.genre || "",
``,
`【問題分類】`,
a.category || "",
``,
`【対象・テーマ】`,
a.target || "",
``,
`【状況】`,
a.situation || "",
``,
`【期間】`,
a.period || "",
``,
`【今の感情】`,
a.emotion || "",
``,
`【AIに求めること】`,
a.goal || "",
``,
`【補足】`,
a.note || "なし",
``,
`【回答スタイル】`,
a.style || "おまかせ",
``,
`【ジャンル別の分析補正】`,
genreCorrection(),
``,
`【回答スタイル補正】`,
styleInstruction(),
``,
`【出力条件】`,
`・表面的な励ましだけで終わらせない`,
`・原因と結果を分ける`,
`・相手側の可能性と自分側の可能性を分ける`,
`・断定しすぎず、複数の可能性を出す`,
`・最後に今日できる行動を3つ出す`,
`・必要なら「追加で確認したいこと」も出す`
  ].join("\n");
}

function renderResult() {
  const prompt = makePrompt();
  $("promptBox").textContent = prompt;
  const items = [
    ["ジャンル", state.answers.genre],
    ["分類", state.answers.category],
    ["対象", state.answers.target],
    ["状況", state.answers.situation],
    ["期間", state.answers.period],
    ["感情", state.answers.emotion],
    ["目的", state.answers.goal],
    ["スタイル", state.answers.style],
  ];
  $("summary").innerHTML = items.filter(x => x[1]).map(([k,v]) => `<div class="chip"><b>${escapeHtml(k)}</b><span>${escapeHtml(v)}</span></div>`).join("");
  show("result");
}

async function copyPrompt() {
  const text = $("promptBox").textContent || "";
  try {
    await navigator.clipboard.writeText(text);
    toast();
  } catch(e) {
    const ta = document.createElement("textarea");
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    ta.remove();
    toast();
  }
}

function toast() {
  $("copyOk").classList.add("show");
  setTimeout(() => $("copyOk").classList.remove("show"), 1400);
}

function escapeHtml(str) {
  return String(str ?? "").replace(/[&<>"']/g, s => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[s]));
}
